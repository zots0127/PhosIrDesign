name: Release Full Workflow Output

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag, for example v1.0.0"
        required: true
        type: string
      release_name:
        description: "Optional release title"
        required: false
        type: string
      prerelease:
        description: "Mark this release as a prerelease"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-compute-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  compute-and-release:
    name: Run workflow on macOS and publish release assets
    runs-on: macos-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Linux system libraries
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgomp1

      - name: Run complete PhosIrDesign workflow
        env:
          UV_PYTHON: "3.9"
          UV_RECREATE: "1"
          OUTPUT_DIR: Project_Output
        run: bash run.sh

      - name: Record release runner metadata
        run: |
          set -euo pipefail

          mkdir -p Project_Output/environment
          {
            echo "runner_os=${RUNNER_OS:-unknown}"
            echo "runner_arch=${RUNNER_ARCH:-unknown}"
            echo "uname=$(uname -a)"
            if command -v sw_vers >/dev/null 2>&1; then
              sw_vers
            fi
          } > Project_Output/environment/runner.txt

          .venv/bin/python - <<'PY'
          import importlib
          import json
          import os
          import platform
          import sys
          from pathlib import Path

          packages = {}
          for package, module_name in {
              "xgboost": "xgboost",
              "scikit-learn": "sklearn",
              "numpy": "numpy",
              "pandas": "pandas",
              "scipy": "scipy",
              "rdkit": "rdkit",
              "lightgbm": "lightgbm",
              "catboost": "catboost",
          }.items():
              try:
                  module = importlib.import_module(module_name)
                  packages[package] = getattr(module, "__version__", "unknown")
              except Exception as exc:
                  packages[package] = f"unavailable: {exc.__class__.__name__}"

          payload = {
              "runner_os": os.environ.get("RUNNER_OS"),
              "runner_arch": os.environ.get("RUNNER_ARCH"),
              "platform": platform.platform(),
              "machine": platform.machine(),
              "processor": platform.processor(),
              "python": sys.version,
              "packages": packages,
          }
          Path("Project_Output/environment/release_environment.json").write_text(
              json.dumps(payload, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Prepare release assets
        env:
          VERSION: ${{ inputs.version }}
          RELEASE_NAME: ${{ inputs.release_name }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: |
          set -euo pipefail

          OUTPUT_DIR="Project_Output"
          if [ ! -d "$OUTPUT_DIR" ]; then
            echo "Expected output directory not found: $OUTPUT_DIR" >&2
            exit 1
          fi
          if [ ! -f "$OUTPUT_DIR/workflow_summary.json" ]; then
            echo "Expected workflow summary not found: $OUTPUT_DIR/workflow_summary.json" >&2
            exit 1
          fi

          SAFE_VERSION="${VERSION//\//-}"
          ASSET_DIR="release_assets"
          mkdir -p "$ASSET_DIR/xgboost_models"

          tar -czf "$ASSET_DIR/PhosIrDesign-${SAFE_VERSION}-Project_Output.tar.gz" "$OUTPUT_DIR"

          XGB_DIR="$OUTPUT_DIR/all_models/automl_train/xgboost/models"
          if [ ! -d "$XGB_DIR" ]; then
            echo "Expected XGBoost model directory not found: $XGB_DIR" >&2
            exit 1
          fi
          cp "$XGB_DIR"/xgboost_*_final.joblib "$ASSET_DIR/xgboost_models/"
          tar -czf "$ASSET_DIR/PhosIrDesign-${SAFE_VERSION}-xgboost_models.tar.gz" -C "$ASSET_DIR" xgboost_models
          rm -rf "$ASSET_DIR/xgboost_models"

          cp "$OUTPUT_DIR/workflow_summary.json" "$ASSET_DIR/PhosIrDesign-${SAFE_VERSION}-workflow_summary.json"
          cp "$OUTPUT_DIR/model_comparison_detailed.csv" "$ASSET_DIR/PhosIrDesign-${SAFE_VERSION}-model_comparison_detailed.csv"
          cp "$OUTPUT_DIR/best_models_summary.csv" "$ASSET_DIR/PhosIrDesign-${SAFE_VERSION}-best_models_summary.csv"
          cp "$OUTPUT_DIR/environment/release_environment.json" "$ASSET_DIR/PhosIrDesign-${SAFE_VERSION}-release_environment.json"

          (
            cd "$ASSET_DIR"
            find . -maxdepth 1 -type f ! -name SHA256SUMS.txt -print0 \
              | sort -z \
              | xargs -0 shasum -a 256 > SHA256SUMS.txt
          )

          TITLE="${RELEASE_NAME:-PhosIrDesign ${VERSION}}"
          cat > release_notes.md <<EOF
          # ${TITLE}

          This release was generated by the full PhosIrDesign GitHub Actions workflow on a GitHub-hosted macOS runner.

          Included assets:
          - Full workflow output archive: \`PhosIrDesign-${SAFE_VERSION}-Project_Output.tar.gz\`
          - XGBoost backend model bundle: \`PhosIrDesign-${SAFE_VERSION}-xgboost_models.tar.gz\`
          - Workflow summary and model comparison tables
          - Release runner environment metadata
          - SHA-256 checksums: \`SHA256SUMS.txt\`

          The XGBoost model bundle can be extracted and used by the Python predictor backend via \`PHOSIR_MODEL_DIR\`.
          EOF

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: phosirdesign-${{ inputs.version }}-release-assets
          path: release_assets/
          retention-days: 30

      - name: Publish or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
          RELEASE_NAME: ${{ inputs.release_name }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: |
          set -euo pipefail

          TITLE="${RELEASE_NAME:-PhosIrDesign ${VERSION}}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "$VERSION" "$GITHUB_SHA"
          git push origin "refs/tags/$VERSION" --force

          PRERELEASE_FLAG=()
          if [ "$PRERELEASE" = "true" ]; then
            PRERELEASE_FLAG=(--prerelease)
          fi

          if gh release view "$VERSION" >/dev/null 2>&1; then
            gh release edit "$VERSION" \
              --title "$TITLE" \
              --notes-file release_notes.md \
              "${PRERELEASE_FLAG[@]}"
            gh release upload "$VERSION" release_assets/* --clobber
          else
            gh release create "$VERSION" release_assets/* \
              --title "$TITLE" \
              --notes-file release_notes.md \
              --target "$GITHUB_SHA" \
              "${PRERELEASE_FLAG[@]}"
          fi
